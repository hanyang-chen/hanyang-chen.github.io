items:
  - date: "2026-07-10"
    content: 'Received the IROS travel award. Thanks to the IROS committee for the support!'

  - date: "2026-06-24"
    content: 'Glad to receive the award of "Outstanding Master''s Thesis of Beijing Jiaotong University".'

  - date: "2026-06-17"
    content: 'Our paper: "DADiff: Diffusion-Driven Cross-Domain Policy Adaptation for Reinforcement Learning" is accepted by IROS 2026. See you in Pittsburgh!'

  - date: "2026-05-23"
    content: 'Glad to receive the award of "Outstanding Graduating Student of Beijing Jiaotong University".'

  - date: "2026-05-16"
    content: 'Our paper: "<a href="https://www.alphaxiv.org/abs/2605.28603">Online Irregular Multivariate Time Series Forecasting via Uncertainty-Driven Dual-Expert Calibration</a>" is accepted by KDD 2026. See you in Jeju!'

  - date: "2025-06-20"
    content: 'Our paper: "<a href="https://ieeexplore.ieee.org/document/11045885">Proactive-XLight: Proactive Traffic Signal Control with Pluggable and Reliable Traffic Prediction</a>" is accepted by IEEE TMC. It is available now!'

  - date: "2024-11-08"
    content: "I have received the National Scholarship."

  - date: "2024-10-12"
    content: "I have received the NeurIPS 2024 Scholar Award."

  - date: "2024-09-26"
    content: 'Our paper: "<a href="https://proceedings.neurips.cc/paper_files/paper/2024/hash/df20e06b04dfc499a1a698796abb0856-Abstract-Conference.html">DiffLight: A Partial Rewards Conditioned Diffusion Model for Traffic Signal Control with Missing Data</a>" is accepted by NeurIPS 2024. See you in Vancouver!'

  - date: "2023-06-21"
    content: 'Glad to receive the award of "Outstanding Graduating Student of Beijing".'
